name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

env:
  REGISTRY_LOGIN_SERVER: rfppilotregistry.azurecr.io
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-backend:latest ./backend
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-backend:latest

      - name: Build and Push AI Engine Image
        if: ${{ hashFiles('ai_engine/Dockerfile') != '' }}
        run: |
          docker build -t ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-ai-engine:latest ./ai_engine
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-ai-engine:latest

      - name: Skip AI Engine Image Build (source not present)
        if: ${{ hashFiles('ai_engine/Dockerfile') == '' }}
        run: echo "Skipping AI Engine image build because ai_engine/Dockerfile was not found."
