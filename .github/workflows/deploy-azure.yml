name: Build and Push to Azure Container Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY_LOGIN_SERVER: rfppilotregistry.azurecr.io
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # DEBUG: confirm correct files
      # -----------------------------
      - name: Show AI Engine requirements
        run: cat ./ai_engine/requirements.txt

      - name: Show Backend requirements
        run: cat ./backend/requirements.txt || echo "No backend requirements file"

      # -----------------------------
      # Azure login
      # -----------------------------
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      # -----------------------------
      # Build AI Engine (NO CACHE)
      # -----------------------------
      - name: Build AI Engine Image
        run: |
          docker build --no-cache --pull \
            -t ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-ai-engine:latest \
            ./ai_engine

      - name: Push AI Engine Image
        run: |
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-ai-engine:latest

      # -----------------------------
      # Build Backend (NO CACHE)
      # -----------------------------
      - name: Build Backend Image
        run: |
          docker build --no-cache --pull \
            -t ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-backend:latest \
            ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ env.REGISTRY_LOGIN_SERVER }}/rfp-backend:latest
