services:
  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - QDRANT_URL=https://94c5ebf0-8087-421a-a94c-f8f0a86585d0.us-east-2-0.aws.cloud.qdrant.io
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - ELASTICSEARCH_HOST=elasticsearch
      - REDIS_HOST=redis
      - LLM_PROVIDER=${LLM_PROVIDER}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PLANNER_GROQ_API_KEY=${PLANNER_GROQ_API_KEY}
      - JUDGE_GROQ_API_KEY=${JUDGE_GROQ_API_KEY}
      - WRITER_GROQ_API_KEY=${WRITER_GROQ_API_KEY}
      - GATEKEEPER_GROQ_API_KEY=${GATEKEEPER_GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}
    depends_on:
      - neo4j
      - redis
      - elasticsearch
    networks:
      - rfp-network

  net-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PythonEngine__Url=http://ai_engine:8000
      - ConnectionStrings__Redis=redis:6379
      - AzureStorage__ConnectionString=${AZURE_STORAGE_CONNECTION_STRING}
    depends_on:
      - ai_engine
      - redis
    networks:
      - rfp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - net-api
    networks:
      - rfp-network

  neo4j:
    build:
      context: .
      dockerfile: ./infrastructure/docker/neo4j.Dockerfile
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - rfp-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - rfp-network

  elasticsearch:
    build:
      context: .
      dockerfile: ./infrastructure/docker/elasticsearch.Dockerfile
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - rfp-network

volumes:
  neo4j_data:
  es_data:

networks:
  rfp-network:
    driver: bridge
